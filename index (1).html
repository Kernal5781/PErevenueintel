async function cosmosAuth(verb, resType, resLink, date, key) {
  const txt = `${verb.toLowerCase()}\n${resType.toLowerCase()}\n${resLink}\n${date.toLowerCase()}\n\n`;
  const kb = Uint8Array.from(atob(key), c => c.charCodeAt(0));
  const ck = await crypto.subtle.importKey("raw", kb, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
  const sig = await crypto.subtle.sign("HMAC", ck, new TextEncoder().encode(txt));
  return encodeURIComponent(`type=master&ver=1.0&sig=${btoa(String.fromCharCode(...new Uint8Array(sig)))}`);
}

async function fetchCosmos() {
  try {
    const d = new Date().toUTCString(), rl = `dbs/${DB}/colls/${COL}`;
    const auth = await cosmosAuth("post", "docs", rl, d, COSMOS_KEY);
    const r = await fetch(`${COSMOS_EP}${rl}/docs`, {
      method: "POST",
      headers: { "Content-Type": "application/query+json", "x-ms-version": "2018-12-31", "x-ms-date": d, "x-ms-documentdb-isquery": "true", "x-ms-documentdb-query-enablecrosspartition": "true", "x-ms-max-item-count": "1000", Authorization: auth },
      body: JSON.stringify({ query: "SELECT * FROM c WHERE (IS_DEFINED(c.investorName) AND c.investorName != '') OR (IS_DEFINED(c.Investors) AND c.Investors != '')", parameters: [] }),
    });
    if (!r.ok) throw new Error(`${r.status}`);
    const docs = (await r.json()).Documents || [];
    return { source: "live", data: docs.map(x => { if (!x.investorName && x.Investors) x.investorName = x.Investors; return x; }) };
  } catch (e) { console.warn("Cosmos direct:", e.message); }

  // Fallback: try JSON snapshot URL (exported from Colab)
  // Replace this URL with your actual snapshot location after running the export
  const SNAPSHOT_URLS = [
    // Add your snapshot URL here after exporting from Colab:
    // "https://yourblobstorage.blob.core.windows.net/pe-intelligence/pe_intelligence_snapshot.json",
    // "https://gist.githubusercontent.com/YOUR_USER/GIST_ID/raw/pe_intelligence_snapshot.json",
  ];
  for (const url of SNAPSHOT_URLS) {
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      const snapshot = await r.json();
      const docs = snapshot.documents || snapshot.Documents || [];
      return { source: "snapshot", data: docs.map(x => { if (!x.investorName && x.Investors) x.investorName = x.Investors; return x; }), timestamp: snapshot.export_timestamp_utc };
    } catch { continue; }
  }

  return null;
}

<div style={{display:"flex",flexDirection:"column",gap:9}}>{[{l:"Direct Determination",t:rs.direct_determination_rationale,tier:"direct"},{l:"Heuristic Inference",t:rs.heuristic_rationale,tier:"heuristic"},{l:"Timing & Intent",t:rs.timing_intent_rationale,tier:"timing"}].map((r,i)=><div key={i}><div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}><Tier t={r.tier}/><span style={{fontSize:10,fontWeight:600,color:C.t7}}>{r.l}</span></div><p style={{fontSize:11,color:C.t5,lineHeight:1.6,margin:0}}>{r.t}</p></div>)}</div></div>

<div style={{fontSize:9,fontWeight:700,color:C.t4,letterSpacing:.7,marginBottom:5,textTransform:"uppercase"}}>Signals ({allS.length})</div>
<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:16}}>{allS.map((s,i)=><div key={i} style={{display:"inline-flex",alignItems:"center",gap:3,padding:"3px 8px",borderRadius:4,background:s.signal_tier==="direct"?C.b50:s.signal_tier==="heuristic"?C.p50:C.g50,border:`1px solid ${s.signal_tier==="direct"?C.b100:s.signal_tier==="heuristic"?C.p100:C.g100}`,fontSize:10}}><span style={{fontWeight:700,color:s.signal_tier==="direct"?C.blue:s.signal_tier==="heuristic"?C.p5:C.g6,fontFamily:"'DM Mono',monospace"}}>{s.score}</span><span style={{color:C.t5}}>{s.signal_name}</span></div>)}</div>
{(p.discovery_questions||[]).length>0&&<><div style={{fontSize:9,fontWeight:700,color:C.t4,letterSpacing:.7,marginBottom:5,textTransform:"uppercase"}}>Discovery Questions → 85%+</div><div style={{background:C.gray50,borderRadius:7,padding:11,marginBottom:16,border:bd}}>{(p.discovery_questions||[]).map((q,i)=><div key={i} style={{display:"flex",gap:5,marginBottom:3,fontSize:11,color:C.t7}}><span style={{fontWeight:700,color:C.blue,minWidth:13,fontFamily:"'DM Mono',monospace"}}>{i+1}.</span>{q}</div>)}</div></>}
{(p.gaps_or_uncertainties||[]).length>0&&<div style={{background:C.a50,borderRadius:7,padding:11,border:`1px solid ${C.a100}`}}><div style={{fontSize:9,fontWeight:700,color:C.a8,letterSpacing:.4,marginBottom:3}}>GAPS & UNCERTAINTIES</div>{(p.gaps_or_uncertainties||[]).map((g,i)=><div key={i} style={{fontSize:10,color:C.t5,marginBottom:2}}>• {g}</div>)}</div>}
</div></div></div>}

{sigs.length>0&&<><div style={{fontSize:9,fontWeight:700,color:C.t4,letterSpacing:.7,marginBottom:7,textTransform:"uppercase"}}>Key Signals</div><div style={{display:"grid",gap:6}}>{sigs.slice(0,5).map((s,i)=><div key={i} style={{display:"flex",gap:9,alignItems:"flex-start",padding:"8px 12px",background:C.gray50,borderRadius:6,border:`1px solid ${C.borderL}`}}><div style={{minWidth:30,height:30,borderRadius:5,background:s.score>=12?C.g50:s.score>=8?C.a50:C.gray100,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,color:s.score>=12?C.g6:s.score>=8?C.a6:C.t4,fontFamily:"'DM Mono',monospace",border:`1px solid ${s.score>=12?C.g100:s.score>=8?C.a100:C.gray200}`,flexShrink:0}}>{s.score}</div><div><div style={{fontSize:12,fontWeight:600,color:C.t9}}>{s.signal_name}</div><div style={{fontSize:10,color:C.t5,marginTop:1,lineHeight:1.5}}>{s.rationale}</div>{s.evidence_date&&<div style={{fontSize:9,color:C.t4,marginTop:1}}>{s.evidence_date} · <span style={{background:C.gray100,padding:"1px 4px",borderRadius:2}}>{s.source_type}</span></div>}</div></div>)}</div></>}</div></div>
<div style={{display:"flex",gap:6,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}><span style={{fontSize:9,fontWeight:700,color:C.t4,letterSpacing:.7,textTransform:"uppercase"}}>Portfolio Pre-Assessment</span><span style={{fontSize:10,color:C.g6,fontWeight:600}}>{sm.high_priority_portfolios||0} High</span><span style={{color:C.t3}}>·</span><span style={{fontSize:10,color:C.a6,fontWeight:600}}>{sm.medium_priority_portfolios||0} Med</span><span style={{color:C.t3}}>·</span><span style={{fontSize:10,color:C.t4}}>{sm.low_priority_portfolios||0} Low</span></div>

<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:9}}>{ports.map((p,i)=>{const pe2=p.parameter_estimates||{};return <div key={i} onClick={()=>onPort(p)} style={{background:C.white,borderRadius:7,padding:"12px 16px",cursor:"pointer",border:bd,transition:"all .15s",borderLeft:`3px solid ${lc(p.preassessment_label)}`,position:"relative"}} onMouseOver={e=>{e.currentTarget.style.boxShadow="0 3px 8px rgba(0,0,0,.04)";e.currentTarget.style.borderColor=lbd(p.preassessment_label)}} onMouseOut={e=>{e.currentTarget.style.boxShadow="none";e.currentTarget.style.borderColor=C.border}}><div style={{position:"absolute",top:7,right:10,fontSize:9,color:C.t3,fontFamily:"'DM Mono',monospace"}}>#{i+1}</div><div style={{display:"flex",alignItems:"center",gap:9,marginBottom:7}}><Score v={p.preassessment_score} sz={32}/><div><div style={{fontSize:12,fontWeight:600,color:C.t9}}>{p.portfolio_name}</div><div style={{fontSize:10,color:C.t4}}>{pe2.industry_vertical?.value||"—"} · {pe2.client_fte_count?.value||"?"} FTEs</div></div></div><div style={{display:"flex",gap:3,marginBottom:5}}>{(p.direct_determination_signals||[]).length>0&&<Tier t="direct"/>}{(p.heuristic_signals||[]).length>0&&<Tier t="heuristic"/>}{(p.timing_intent_signals||[]).length>0&&<Tier t="timing"/>}</div><p style={{fontSize:10,color:C.t5,lineHeight:1.5,margin:0,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{p.preassessment_summary}</p><div style={{marginTop:6,fontSize:9,color:C.blue,fontWeight:500}}>View rationale →</div></div>})}</div></div>}

/* ═══════════ MAIN APP ═══════════ */
function App(){const[data,setData]=useState([]);const[loading,setLoading]=useState(true);const[view,setView]=useState("table");const[selPE,setSelPE]=useState(null);const[selP,setSelP]=useState(null);const[search,setSearch]=useState("");const[ts,setTs]=useState(null);const[sortBy,setSortBy]=useState("score");const[conn,setConn]=useState("connecting");
const load=useCallback(async()=>{setLoading(true);setConn("connecting");const result=await fetchCosmos();if(result){setData(result.data.sort((a,b)=>(b[F]?.overall_priority_score||0)-(a[F]?.overall_priority_score||0)));setConn(result.source)}else{setData(demo().sort((a,b)=>(b[F]?.overall_priority_score||0)-(a[F]?.overall_priority_score||0)));setConn("demo")}setTs(new Date());setLoading(false)},[]);
useEffect(()=>{load()},[load]);useEffect(()=>{const iv=setInterval(load,60000);return()=>clearInterval(iv)},[load]);
const filtered=useMemo(()=>{let d=data;if(search)d=d.filter(pe=>(pe.investorName||"").toLowerCase().includes(search.toLowerCase()));if(sortBy==="name")d=[...d].sort((a,b)=>(a.investorName||"").localeCompare(b.investorName||""));else if(sortBy==="portfolios")d=[...d].sort((a,b)=>(b[F]?.portfolio_preassessment?.portfolio_count||0)-(a[F]?.portfolio_preassessment?.portfolio_count||0));return d},[data,search,sortBy]);
const st=useMemo(()=>{let tp=0,hp=0,mp=0,lp=0,tpo=0,hpo=0;data.forEach(pe=>{tp++;const r=pe[F]||{},l=(r.priority_label||"").toLowerCase();if(l==="high")hp++;else if(l==="medium")mp++;else lp++;const pp=r.portfolio_preassessment||{};tpo+=pp.portfolio_count||0;hpo+=pp.summary?.high_priority_portfolios||0});return{tp,hp,mp,lp,tpo,hpo}},[data]);
const csv=()=>{const rows=[["PE Firm","Priority","Score","Portfolios","High","Med","Low","Signal","Summary"]];data.forEach(pe=>{const r=pe[F]||{},pp=r.portfolio_preassessment||{},s=pp.summary||{};rows.push([`"${pe.investorName}"`,r.priority_label||"",r.overall_priority_score||0,pp.portfolio_count||0,s.high_priority_portfolios||0,s.medium_priority_portfolios||0,s.low_priority_portfolios||0,`"${(r.signals||[])[0]?.signal_name||""}"`,`"${(r.current_news_summary||"").replace(/"/g,"'").substring(0,200)}"`])});const c=rows.map(r=>r.join(",")).join("\n");const b=new Blob([c],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`consero_pe_intel_${new Date().toISOString().split("T")[0]}.csv`;a.click()};
if(selPE)return <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans',sans-serif"}}><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/><div style={{maxWidth:1180,margin:"0 auto",padding:"20px 26px"}}><PEView pe={selPE} onBack={()=>setSelPE(null)} onPort={setSelP}/></div><PortModal p={selP} onClose={()=>setSelP(null)}/></div>;
return <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans',sans-serif"}}><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<div style={{background:C.nav,padding:"0 26px",display:"flex",alignItems:"center",justifyContent:"space-between",height:46}}><div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:6,height:6,borderRadius:"50%",background:C.g5,boxShadow:"0 0 5px "+C.g5}}/><span style={{fontSize:14,fontWeight:700,color:C.navA,letterSpacing:-.3}}>Consero</span><span style={{fontSize:12,color:C.navT}}>PE Intelligence</span></div>
<div style={{display:"flex",alignItems:"center",gap:8,fontSize:10,color:C.navT}}><span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,background:conn==="live"?"rgba(16,185,129,.12)":conn==="snapshot"?"rgba(96,165,250,.12)":conn==="demo"?"rgba(245,158,11,.12)":"rgba(255,255,255,.06)"}}><span style={{width:5,height:5,borderRadius:"50%",background:conn==="live"?C.g5:conn==="snapshot"?"#60a5fa":conn==="demo"?C.a5:"#9ca3af",boxShadow:conn==="live"?"0 0 4px "+C.g5:conn==="snapshot"?"0 0 4px #60a5fa":"none"}}/><span style={{color:conn==="live"?C.g5:conn==="snapshot"?"#60a5fa":conn==="demo"?C.a5:"#9ca3af",fontWeight:600,fontSize:9}}>{conn==="live"?`LIVE · ${data.length} firms`:conn==="snapshot"?`SNAPSHOT · ${data.length} firms`:conn==="demo"?"DEMO DATA":"..."}</span></span>{ts&&<span>{ts.toLocaleTimeString()}</span>}</div></div>

<button onClick={load} style={{padding:"5px 11px",background:C.blue,border:"none",borderRadius:5,cursor:"pointer",fontSize:10,color:"#fff",fontWeight:600}}>⟳</button></div></div>
{loading?<div style={{textAlign:"center",padding:50,color:C.t4}}>Connecting...</div>:view==="3d"?<div style={{height:380,background:C.white,borderRadius:8,border:bd,marginBottom:14,overflow:"hidden",position:"relative"}}><Net3D data={filtered} onSelect={setSelPE}/><div style={{position:"absolute",bottom:8,left:12,display:"flex",gap:10,fontSize:8,color:C.t4,background:"rgba(255,255,255,.85)",padding:"4px 8px",borderRadius:4}}><span><span style={{color:C.blue,fontWeight:700}}>X</span> Portfolios</span><span><span style={{color:C.g6,fontWeight:700}}>Y</span> Score</span><span><span style={{color:C.p5,fontWeight:700}}>Z</span> Sector</span><span style={{color:C.t3}}>· Drag to rotate · Click node to open</span></div></div>:null}

ng:"9px 11px",textAlign:"center"}}>{(r.signals||[])[0]?<span style={{fontSize:9,padding:"2px 6px",borderRadius:3,background:C.gray100,color:C.t5}}>{(r.signals||[])[0].signal_one_word}</span>:"—"}</td><td style={{padding:"9px 11px",textAlign:"center",fontSize:10,color:C.blue,fontWeight:500}}>View →</td></tr>})}</tbody></table></div></div></div>}
